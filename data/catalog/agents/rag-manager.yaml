id: rag-manager
tool_ids:
  - proxy-pointer-rag
  - workspace
card:
  role: RagManager
  description: >
    Entry-point agent for the Proxy-Pointer RAG team.
    Receives the user question, orchestrates the 5-step retrieval/synthesis
    pipeline (@Retriever → @Reranker → @Synthesizer), and returns a grounded
    cited answer to @Human.
  skills:
    - orchestration
    - query routing
    - pipeline coordination
    - answer synthesis
  agent_class: akgentic.agent.BaseAgent
  config:
    name: "@RagManager"
    role: RagManager
    model_cfg:
      provider: openai
      model: gpt-4.1
      temperature: 0.3
  routes_to:
    - "@Retriever"
    - "@Reranker"
    - "@Synthesizer"
