id: synthesizer
tool_ids:
  - proxy-pointer-rag
  - workspace
card:
  role: Synthesizer
  description: >
    Loads full section text from disk for each shortlisted hit via
    skeleton.json + char offsets, then produces a grounded answer with
    [doc_id#node_id] inline citations.
  skills:
    - section loading
    - grounded synthesis
    - citation generation
    - legal/regulatory analysis
  agent_class: akgentic.agent.BaseAgent
  config:
    name: "@Synthesizer"
    role: Synthesizer
    model_cfg:
      provider: openai
      model: gpt-4.1
      temperature: 0.3
  routes_to:
    - "@RagManager"
